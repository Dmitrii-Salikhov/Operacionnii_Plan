name: Release

on:
  push:
    tags:
      - 'v*'   # Запускать при пуше тега, начинающегося с 'v', например v1.0.0

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5

      - name: Установка Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Сборка PyInstaller
        run: pyinstaller --name PlanOperaciy --windowed --icon=hospital.ico --add-data "version.txt;." --hidden-import tkcalendar --hidden-import fuzzywuzzy --hidden-import googleapiclient.discovery --hidden-import google.auth.transport.requests --hidden-import google_auth_oauthlib.flow plan_generator.py

      - name: Создать ZIP-архив
        run: |
          cd dist
          7z a PlanOperaciy-Windows.zip PlanOperaciy\*
        shell: bash

      - name: Создать релиз и загрузить артефакт
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PlanOperaciy-Windows.zip
          name: "Release ${{ github.ref_name }}"
          body: "Автоматическая сборка версии ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
